name: Auto-merge Copilot PRs

on:
  pull_request_target:
    types: [opened, synchronize, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.actor == 'copilot-swe-agent[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Merge PR
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;

            if (pr.draft) {
              console.log(`⏳ PR #${pr.number} is still a draft — skipping auto-merge`);
              return;
            }

            console.log(`Auto-merging Copilot PR #${pr.number}: ${pr.title}`);
            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                merge_method: 'squash'
              });
              console.log('✅ PR merged successfully');
            } catch (error) {
              console.log(`⚠️ Auto-merge failed for PR #${pr.number}: ${error.message}`);
              console.log('This can happen if there are merge conflicts or the PR is not mergeable yet.');
              throw error;
            }
